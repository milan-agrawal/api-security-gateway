<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email Change - API Security Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle cyan"></div>
        <div class="particle small"></div>
        <div class="particle"></div>
        <div class="particle cyan small"></div>
        <div class="particle"></div>
        <div class="particle small"></div>
        <div class="particle cyan"></div>
        <div class="particle"></div>
        <div class="particle small"></div>
    </div>

    <div class="login-container">
        <div class="logo-section">
            <div class="logo">API Security Gateway</div>
            <div class="logo-subtitle">Secure account verification</div>
        </div>

        <div class="login-card">
            <div class="login-header">
                <h1>Verify Email Change</h1>
                <p id="intro">Confirm your new email address to finish updating your account.</p>
            </div>

            <div id="alert" class="alert"></div>

            <div class="form-group">
                <button type="button" class="btn-login" id="verifyBtn">Verify Email Address</button>
            </div>

            <div class="divider">
                <span>Already verified?</span>
            </div>

            <div class="signup-link">
                <a href="login.html">Back to login</a>
            </div>
        </div>
    </div>

    <script src="assets/js/verify-email-change.js"></script>
</body>
</html>
