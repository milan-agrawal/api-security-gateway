<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - API Security Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <!-- Floating Particles Background -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle cyan"></div>
        <div class="particle small"></div>
        <div class="particle"></div>
        <div class="particle cyan small"></div>
        <div class="particle"></div>
        <div class="particle small"></div>
        <div class="particle cyan"></div>
        <div class="particle"></div>
        <div class="particle small"></div>
    </div>

    <div class="login-container">
        <div class="logo-section">
            <div class="logo">🛡️ API Security Gateway</div>
            <div class="logo-subtitle">Enterprise-Grade API Protection</div>
        </div>

        <div class="login-card">
            <div class="login-header">
                <h1>Forgot Password</h1>
                <p>Enter your email and we'll send a reset link</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="you@company.com"
                            required
                            autocomplete="email"
                            autofocus
                        >
                    </div>
                </div>

                <button type="submit" class="btn-login" id="submitBtn">
                    Send Reset Link
                </button>
            </form>

            <div class="divider">
                <span>Remembered your password?</span>
            </div>

            <div class="signup-link">
                <a href="login.html">← Back to login</a>
            </div>
        </div>
    </div>

    <script src="assets/js/forgot-password.js"></script>
</body>
</html>
