<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - API Security Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <!-- Floating Particles Background -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle cyan"></div>
        <div class="particle small"></div>
        <div class="particle"></div>
        <div class="particle cyan small"></div>
        <div class="particle"></div>
        <div class="particle small"></div>
        <div class="particle cyan"></div>
        <div class="particle"></div>
        <div class="particle small"></div>
    </div>

    <div class="login-container">
        <div class="logo-section">
            <div class="logo">🛡️ API Security Gateway</div>
            <div class="logo-subtitle">Enterprise-Grade API Protection</div>
        </div>

        <div class="login-card">
            <div class="login-header">
                <h1>Reset Password</h1>
                <p id="intro">Choose a new secure password for your account</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="newPassword"
                            name="newPassword"
                            placeholder="Min. 8 chars with upper, lower, digit &amp; symbol"
                            required
                            minlength="8"
                            class="has-toggle"
                        >
                        <button type="button" class="password-toggle" id="toggleNew" aria-label="Toggle password visibility">
                            <svg id="eyeIconNew" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            placeholder="Re-enter your new password"
                            required
                            minlength="8"
                            class="has-toggle"
                        >
                        <button type="button" class="password-toggle" id="toggleConfirm" aria-label="Toggle password visibility">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="submitBtn">
                    Set New Password
                </button>
            </form>

            <div class="divider">
                <span>Remembered your password?</span>
            </div>

            <div class="signup-link">
                <a href="login.html">← Back to login</a>
            </div>
        </div>
    </div>

    <script src="assets/js/reset-password.js"></script>
</body>
</html>
